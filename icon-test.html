<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Icon Test</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body>
    <h1>Material Symbols Icons Test</h1>
    <p>Arrow forward: <span class="material-symbols-outlined">arrow_forward</span></p>
    <p>Chevron left: <span class="material-symbols-outlined">chevron_left</span></p>
    <p>Chevron right: <span class="material-symbols-outlined">chevron_right</span></p>
    <p>Add: <span class="material-symbols-outlined">add</span></p>
    <p>Verified user: <span class="material-symbols-outlined">verified_user</span></p>
    <p>Spa: <span class="material-symbols-outlined">spa</span></p>
    <p>Routine: <span class="material-symbols-outlined">routine</span></p>
    <p>Auto videocam: <span class="material-symbols-outlined">auto_videocam</span></p>
    <p>Support agent: <span class="material-symbols-outlined">support_agent</span></p>
</body>
</html>
